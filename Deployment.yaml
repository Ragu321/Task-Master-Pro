apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
spec:
  replicas: 6
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java
          image: raghavendra675/java:3fdd84c
          ports:
            - containerPort: 8080
