name: kubernetes ci 
on:
  push:
    branches: 
      - main 
      
jobs:
  java-ci:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout 
        uses: actions/checkout@v4
      - name: Build docker image 
        run: "docker build -t raghavendra675/java:$GITHUB_SHA ."
      - name: login docker   
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKER_USERNAME }}"
          password: "${{ secrets.DOCKER_PASSWORD }}"
      - name: push image to docker 
        run: "docker push raghavendra675/java:${GITHUB_SHA::7}"
        

        
      
